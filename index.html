<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantasy 5.1</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0f14;
    color:white;
}

.header{
    display:flex;
    justify-content:space-between;
    padding:14px;
    background:#111826;
    position:sticky;
    top:0;
    z-index:10;
    font-weight:bold;
}

.tabs{
    display:flex;
    overflow-x:auto;
    background:#111826;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.tab{
    padding:10px 14px;
    color:#aaa;
    white-space:nowrap;
    cursor:pointer;
}

.tab.active{
    color:#4cd964;
    border-bottom:2px solid #4cd964;
}

.screen{
    display:none;
    padding:14px;
}
.screen.active{
    display:block;
}

.card{
    background:#151c26;
    border-radius:14px;
    padding:14px;
    margin-bottom:12px;
}

.hero{
    background:linear-gradient(135deg,#1b2a41,#121826);
    padding:18px;
    border-radius:16px;
    text-align:center;
}

.big{
    font-size:42px;
    font-weight:bold;
    color:#4cd964;
}

.row{
    display:flex;
    justify-content:space-between;
    padding:8px 0;
    border-bottom:1px solid rgba(255,255,255,0.06);
}

.btn{
    width:100%;
    padding:10px;
    border:none;
    border-radius:12px;
    background:#4cd964;
    font-weight:bold;
    color:#0b0f14;
    margin-top:10px;
}

/* PLAYER CARD */
.item{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    border-bottom:1px solid rgba(255,255,255,0.06);
    gap:10px;
}

.left{
    display:flex;
    align-items:center;
    gap:10px;
}

img{
    width:42px;
    height:42px;
    border-radius:50%;
    object-fit:cover;
    border:2px solid rgba(255,255,255,0.1);
}

.small{
    color:#aaa;
    font-size:12px;
}

.price{
    color:#4cd964;
}
</style>
</head>

<body>

<div class="header">
    <div>⚽ Fantasy 5.1</div>
    <div id="total">0 pts</div>
</div>

<div class="tabs">
    <div class="tab active" onclick="openTab(0,this)">Главная</div>
    <div class="tab" onclick="openTab(1,this)">Команда</div>
    <div class="tab" onclick="openTab(2,this)">Рынок</div>
    <div class="tab" onclick="openTab(3,this)">Матчи</div>
</div>

<!-- HOME -->
<div class="screen active">

<div class="card hero">
    <h3>Очки тура</h3>
    <div class="big" id="gw">78</div>
</div>

<div class="card">
    <h3>Лучшие игроки</h3>
    <div class="row"><span>Мбаппе</span><b>14</b></div>
    <div class="row"><span>Месси</span><b>12</b></div>
    <div class="row"><span>Беллингем</span><b>11</b></div>
</div>

</div>

<!-- TEAM -->
<div class="screen">

<div class="card">
<h3>Моя команда</h3>
<div id="team"></div>
<p>Капитан: <b id="cap">—</b></p>
</div>

</div>

<!-- MARKET -->
<div class="screen">

<div class="card">
<h3>Рынок игроков</h3>
<div id="market"></div>
</div>

</div>

<!-- MATCHES -->
<div class="screen">

<div class="card">
<h3>Матчи сборных</h3>

<div class="row">🇫🇷 Франция - 🇦🇷 Аргентина <b>LIVE</b></div>
<div class="row">🇧🇷 Бразилия - 🇩🇪 Германия <b>23:30</b></div>
<div class="row">🇳🇱 Нидерланды - 🇲🇦 Марокко <b>04:00</b></div>

</div>

</div>

<script>

/* PLAYERS WITH IMAGES */
let players=[
{
name:"Mbappé",price:12,pts:14,
img:"https://cdn.sofifa.net/players/231/747/25_120.png"
},
{
name:"Messi",price:11,pts:12,
img:"https://cdn.sofifa.net/players/158/023/25_120.png"
},
{
name:"Bellingham",price:10,pts:11,
img:"https://cdn.sofifa.net/players/253/072/25_120.png"
},
{
name:"Vinícius",price:9,pts:9,
img:"https://cdn.sofifa.net/players/238/794/25_120.png"
},
{
name:"Haaland",price:13,pts:15,
img:"https://cdn.sofifa.net/players/239/085/25_120.png"
}
];

let team=[];
let captain=null;

/* NAV */
function openTab(i,el){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.querySelectorAll(".screen")[i].classList.add("active");

    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    el.classList.add("active");

    render();
}

/* BUY */
function buy(i){
    team.push({...players[i]});
    render();
}

/* SELL */
function sell(i){
    team.splice(i,1);
    render();
}

/* CAPTAIN */
function setCap(name){
    captain=name;
    render();
}

/* TEAM */
function renderTeam(){
    let el=document.getElementById("team");
    el.innerHTML="";

    let total=0;

    team.forEach((p,i)=>{
        let pts=p.pts;
        if(captain===p.name) pts*=2;

        total+=pts;

        el.innerHTML+=`
        <div class="item">
            <div class="left" onclick="setCap('${p.name}')">
                <img src="${p.img}">
                <div>
                    <b>${p.name}</b><br>
                    <span class="small">${pts} pts</span>
                </div>
            </div>
            <button onclick="sell(${i})">Sell</button>
        </div>`;
    });

    document.getElementById("total").innerText=total+" pts";
}

/* MARKET */
function renderMarket(){
    let el=document.getElementById("market");
    el.innerHTML="";

    players.forEach((p,i)=>{
        el.innerHTML+=`
        <div class="item">
            <div class="left">
                <img src="${p.img}">
                <div>
                    <b>${p.name}</b><br>
                    <span class="small">${p.pts} pts</span>
                </div>
            </div>

            <div>
                <div class="price">${p.price}M</div>
                <button onclick="buy(${i})">Buy</button>
            </div>
        </div>`;
    });
}

/* INIT */
function render(){
    renderTeam();
    renderMarket();
}

render();

</script>

</body>
</html>
