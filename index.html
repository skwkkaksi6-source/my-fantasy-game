<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Match Center</title>
    <style>
        body { background-color: #121212; color: #fff; font-family: sans-serif; margin: 0; padding: 0; }
        
        /* ГЛАВНЫЙ ЭКРАН */
        #main-view { padding: 20px; }
        .card { background-color: #1c1c1e; border-radius: 14px; padding: 16px; margin-bottom: 12px; cursor: pointer; display: flex; align-items: center; }
        .logo { width: 35px; height: 35px; background: #333; border-radius: 50%; margin: 0 10px; background-size: cover; }
        .match-info { flex-grow: 1; }
        .match-time { color: #888; font-size: 12px; }
        .match-teams { font-weight: bold; font-size: 15px; }

        /* ДЕТАЛЬНЫЙ ЭКРАН */
        #detail-view { display: none; }
        .header-bar { padding: 20px; background: #1c1c1e; display: flex; align-items: center; gap: 15px; }
        .stat-container { padding: 20px; }
        .stat-block { background: #1c1c1e; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .section-title { font-size: 14px; color: #888; margin-bottom: 10px; text-transform: uppercase; }
        .lineup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

    <div id="main-view">
        <h3>Матчи на сегодня</h3>
        <div id="matches-list"></div>
    </div>

    <div id="detail-view">
        <div class="header-bar" onclick="showMain()">
            <span style="font-size: 20px;">←</span>
            <div id="detail-header-text"></div>
        </div>
        <div class="stat-container" id="detail-content"></div>
    </div>

    <script>
        // ДАННЫЕ (Здесь будет приходить инфа от API)
        const matches = [
            { 
                id: 1, time: "20:00", t1: "Бразилия", t2: "Япония", 
                logo1: "https://upload.wikimedia.org/wikipedia/en/0/05/Flag_of_Brazil.svg", 
                logo2: "https://upload.wikimedia.org/wikipedia/en/9/9e/Flag_of_Japan.svg",
                odds: "1.45 / 4.20 / 7.10",
                lineup: "Бразилия: Алиссон, Данило, Маркиньос... <br> Япония: Судзуки, Томиясу...",
                history: "Последние 5: Бразилия (4W, 1D), Япония (2W, 3L)"
            }
        ];

        function showMain() {
            document.getElementById('main-view').style.display = 'block';
            document.getElementById('detail-view').style.display = 'none';
        }

        function showDetail(id) {
            const m = matches.find(match => match.id === id);
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            
            document.getElementById('detail-header-text').innerHTML = `<strong>${m.t1} — ${m.t2}</strong>`;
            document.getElementById('detail-content').innerHTML = `
                <div class="stat-block">
                    <div class="section-title">Коэффициенты</div>
                    <div>${m.odds}</div>
                </div>
                <div class="stat-block">
                    <div class="section-title">Ожидаемые составы</div>
                    <div>${m.lineup}</div>
                </div>
                <div class="stat-block">
                    <div class="section-title">История встреч и форма</div>
                    <div>${m.history}</div>
                </div>
            `;
        }

        // РЕНДЕР СПИСКА
        document.getElementById('matches-list').innerHTML = matches.map(m => `
            <div class="card" onclick="showDetail(${m.id})">
                <div class="match-time">${m.time}</div>
                <div class="logo" style="background-image: url('${m.logo1}')"></div>
                <div class="logo" style="background-image: url('${m.logo2}')"></div>
                <div class="match-info">
                    <div class="match-teams">${m.t1} — ${m.t2}</div>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
