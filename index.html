<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding: 10px; }
        .content { display: none; }
        .active { display: block; }
        .tab-bar { display: flex; justify-content: space-around; background: #1c1c1e; padding: 10px; position: fixed; bottom: 0; width: 100%; left: 0; }
        .player-row { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #333; }
        .avatar { width: 30px; height: 30px; border-radius: 50%; background: #555; margin-right: 10px; }
        .pts { margin-left: auto; color: #7b61ff; }
        .tour-nav { display: flex; justify-content: space-between; margin: 10px 0; background: #222; padding: 10px; border-radius: 8px; }
        .tour-item { cursor: pointer; text-align: center; font-size: 12px; }
        .deadline { text-align: center; font-weight: bold; padding: 10px; background: #1c1c1e; border-radius: 8px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="main" class="content active">
        <h3>Главная</h3>
        <div class="deadline">До дедлайна: 00:00:00</div>
    </div>

    <div id="team" class="content">
        <h3>Моя команда</h3>
        <div class="tour-nav">
            <div class="tour-item" onclick="alert('R1')">R1</div>
            <div class="tour-item" onclick="alert('R2')">R2</div>
            <div class="tour-item" onclick="alert('R3')">R3</div>
            <div class="tour-item" onclick="alert('R32')">R32</div>
            <div class="tour-item" onclick="alert('R16')">R16</div>
        </div>
        <div id="players-list"></div>
        <button id="toggle-btn" onclick="toggleList()">Показать еще</button>
    </div>

    <div id="matches" class="content">
        <h3>Матчи</h3>
        <div id="matches-list"></div>
    </div>

    <div class="tab-bar">
        <div onclick="showTab('main', this)">Главная</div>
        <div onclick="showTab('team', this)">Команда</div>
        <div onclick="showTab('matches', this)">Матчи</div>
    </div>

    <script>
        const playersData = [
            {name: "Месси", pts: "45pts"}, {name: "Мбаппе", pts: "32pts"}, 
            {name: "Де Брюйне", pts: "25pts"}, {name: "Винисиус", pts: "20pts"}, 
            {name: "Дембеле", pts: "15pts"}, {name: "Холанд", pts: "12pts"}, 
            {name: "Салах", pts: "10pts"}, {name: "Кейн", pts: "8pts"}, 
            {name: "Неймар", pts: "5pts"}, {name: "Гризманн", pts: "3pts"}
        ];
        
        let expanded = false;
        
        function renderPlayers() {
            const list = document.getElementById('players-list');
            const limit = expanded ? playersData.length : 3;
            list.innerHTML = playersData.slice(0, limit).map(p => 
                `<div class="player-row"><div class="avatar"></div><div>${p.name}</div><div class="pts">${p.pts}</div></div>`
            ).join('');
            document.getElementById('toggle-btn').innerText = expanded ? "Скрыть" : "Показать еще";
        }

        function toggleList() { expanded = !expanded; renderPlayers(); }

        function showTab(tabId, el) {
            document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
            document.getElementById(tabId).style.display = 'block';
        }

        const matchesData = [
            { d: "28.06", t: "22:00", name: "ЮАР — Канада" },
            { d: "29.06", t: "20:00", name: "Бразилия — Япония" },
            { d: "29.06", t: "23:30", name: "Германия — Парагвай" }
        ];
        
        document.getElementById('matches-list').innerHTML = matchesData.map(m => 
            `<div style="padding: 10px; border-bottom: 1px solid #333;">${m.d} ${m.t} - ${m.name}</div>`
        ).join('');

        renderPlayers();
    </script>
</body>
</html>
