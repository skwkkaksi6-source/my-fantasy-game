<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; margin: 0; padding: 10px; }
        .player-card { 
            background-color: #2c2c2c; 
            padding: 15px; 
            margin-bottom: 10px; 
            border-radius: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .rating { 
            background-color: #219653; 
            padding: 5px 10px; 
            border-radius: 5px; 
            font-weight: bold; 
        }
        .player-name { font-size: 16px; font-weight: 500; }
    </style>
</head>
<body>
    <h3>Мой состав: Астон Вилла</h3>
    
    <div class="player-card">
        <div>
            <div class="player-name">Pau Cubarsí</div>
            <small style="color: #aaa;">Защитник</small>
        </div>
        <div class="rating">7.4</div>
    </div>

    <div class="player-card">
        <div>
            <div class="player-name">Олли Уоткинс</div>
            <small style="color: #aaa;">Нападающий</small>
        </div>
        <div class="rating">8.1</div>
    </div>
</body>
</html>
