<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; margin: 0; }
        .tabs { display: flex; justify-content: space-around; background: #222; padding: 10px; }
        .tab { cursor: pointer; color: #aaa; padding-bottom: 5px; }
        .tab.active { color: white; border-bottom: 2px solid #fff; }
        .content { display: none; padding: 15px; }
        .content.active { display: block; }
        
        .card { background: #2c2c2c; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        #timer { font-size: 20px; font-weight: bold; margin-top: 5px; }
        
        /* Поле */
        .field { background-color: #21873b; height: 300px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; }
        .btn-container { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; background: #7b61ff; color: white; font-weight: bold; }

        /* Матчи */
        .match-row { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #333; justify-content: space-between; }
        .match-time { font-size: 12px; color: #aaa; width: 60px; }
        .match-teams { flex-grow: 1; margin: 0 15px; }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" onclick="showTab('home')">Главная</div>
        <div class="tab" onclick="showTab('team')">Моя команда</div>
        <div class="tab" onclick="showTab('matches')">Матчи</div>
    </div>

    <div id="home" class="content active">
        <div class="card">
            <div>World Cup 2026</div>
            <div id="timer">00ч : 00м : 00с</div>
        </div>
        <div class="card">Лучшие игроки раунда...</div>
    </div>

    <div id="team" class="content">
        <div class="field">Поле с игроками</div>
        <div class="btn-container">
            <button>ЗАМЕНЫ</button>
            <button>ТРАНСФЕРЫ</button>
        </div>
    </div>

    <div id="matches" class="content">
        <div class="card">
            <div class="match-row"><div class="match-time">22:00</div><div class="match-teams">ЮАР — Канада</div><div>🔔</div></div>
            <div class="match-row"><div class="match-time">20:00</div>
