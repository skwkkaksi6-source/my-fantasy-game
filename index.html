<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; margin: 0; }
        .tabs { display: flex; justify-content: space-around; background: #1e1e1e; padding: 10px; position: sticky; top: 0; z-index: 10; }
        .tab { cursor: pointer; color: #888; padding-bottom: 5px; }
        .tab.active { color: #fff; border-bottom: 2px solid #fff; }
        .content { display: none; padding: 15px; }
        .content.active { display: block; }
        
        .stats-header { background: #2c2c2c; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
        .player-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #333; }
        .avatar { width: 45px; height: 45px; background-color: #444; border-radius: 50%; background-size: cover; margin-right: 15px; }
        .pts { font-weight: bold; color: #a388ff; margin-left: auto; }
        
        .rounds-row { display: flex; justify-content: space-between; align-items: center; background: #1e1e1e; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        .r-item { cursor: pointer; padding: 5px 10px; border-radius: 8px; }
        .r-item.active { background: #4a4af4; }
        
        .field { background: #28a745; border-radius: 12px; padding: 20px; margin-bottom: 15px; text-align: center; }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" onclick="showTab('home', this)">Главная</div>
        <div class="tab" onclick="showTab('team', this)">Моя команда</div>
        <div class="tab" onclick="showTab('matches', this)">Матчи</div>
    </div>

    <div id="home" class="content active">
        <div class="stats-header"><div>Раунд 4</div><div style="font-size: 32px; font-weight: bold;">0</div></div>
        <h3>Лучшие игроки</h3>
        <div id="top-players"></div>
    </div>

    <div id="team" class="content">
        <div class="field">СХЕМА ПОЛЯ</div>
        <div>Здесь будет состав выбранного раунда</div>
    </div>

    <div id="matches" class="content">
        <div class="rounds-row">
            <div class="r-item" onclick="alert('История R2')">R2</div>
            <div class="r-item" onclick="alert('История R3')">R3</div>
            <div class="r-item active">R32</div>
            <div class="r-item" style="color: #666;">R16</div>
        </div>
        <div id="matches-list"></div>
    </div>

    <script>
        const topPlayers = [
            {name: "Мбаппе", pts: "52pts"}, {name: "Винисиус", pts: "48pts"}, {name: "Беллингем", pts: "45pts"}, 
            {name: "Холанд", pts: "42pts"}, {name: "Месси", pts: "40pts"}, {name: "Сака", pts: "38pts"},
            {name: "Ямаль", pts: "36pts"}, {name: "Де Брюйне", pts: "35pts"}, {name: "Кейн", pts: "34pts"},
            {name: "Мусиала", pts: "32pts"}, {name: "Фернандес", pts: "30pts"}, {name: "Родри", pts: "29pts"},
            {name: "Диас", pts: "28pts"}, {name: "Гакпо", pts: "27pts"}, {name: "Салах", pts: "26pts"}
        ];
        
        document.getElementById('top-players').innerHTML = topPlayers.map(p => `
            <div class="player-row"><div class="avatar"></div><div>${p.name}</div><div class="pts">${p.pts}</div></div>
        `).join('');

        function showTab(tabId, el) {
            document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).style.display = 'block';
            el.classList.add('active');
        }
    </script>
</body>
</html>
