<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fantasy 4.0</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b0f14;
    color:white;
}

.topnav{
    display:flex;
    overflow-x:auto;
    background:#111826;
    padding:10px;
    position:sticky;
    top:0;
    z-index:10;
}

.tab{
    padding:8px 14px;
    margin-right:8px;
    border-radius:20px;
    color:#aaa;
    cursor:pointer;
}

.tab.active{
    background:#4cd964;
    color:#0b0f14;
    font-weight:bold;
}

.page{display:none;padding:14px;}
.page.active{display:block}

.card{
    background:#151c26;
    border-radius:14px;
    padding:14px;
    margin-bottom:12px;
}

.hero{
    background:linear-gradient(135deg,#1b2a41,#121826);
    padding:18px;
    border-radius:16px;
    text-align:center;
}

.big{
    font-size:42px;
    font-weight:bold;
    color:#4cd964;
}

.row{
    display:flex;
    justify-content:space-between;
    padding:8px 0;
    border-bottom:1px solid rgba(255,255,255,0.06);
}

.btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#4cd964;
    color:#0b0f14;
    font-weight:bold;
    margin-top:10px;
    cursor:pointer;
}

/* TEAM */
.player{
    display:flex;
    justify-content:space-between;
    padding:10px;
    background:#111826;
    border-radius:10px;
    margin-bottom:8px;
    cursor:pointer;
}

.price{color:#4cd964}
.small{color:#aaa;font-size:12px}
</style>
</head>

<body>

<div class="topnav">
    <div class="tab active" onclick="go(0,this)">Главная</div>
    <div class="tab" onclick="go(1,this)">Команда</div>
    <div class="tab" onclick="go(2,this)">Рынок</div>
    <div class="tab" onclick="go(3,this)">Лига</div>
</div>

<!-- HOME -->
<div class="page active">

<div class="hero">
    <h3>Очки команды</h3>
    <div class="big" id="totalPts">0</div>
    <p>Fantasy 4.0</p>
</div>

<div class="card">
    <h3>Дедлайн</h3>
    <p>4 июля 23:59</p>
</div>

</div>

<!-- TEAM -->
<div class="page">

<div class="card">
<h3>Моя команда</h3>
<div id="myTeam"></div>
<p>Капитан: <b id="captainName">—</b> (x2)</p>
</div>

</div>

<!-- MARKET -->
<div class="page">

<div class="card">
<h3>Рынок</h3>
<div id="market"></div>
</div>

</div>

<!-- LEAGUE -->
<div class="page">

<div class="card">
<h3>Лига</h3>
<div class="row"><span>Ты</span><b id="mePts">0</b></div>
<div class="row"><span>Bot 1</span><b>120</b></div>
<div class="row"><span>Bot 2</span><b>98</b></div>
</div>

</div>

<script>

/* DATA */
let budget = 100;
let captain = null;

let players = [
    {name:"Mbappé", price:12, pts:14},
    {name:"Messi", price:11, pts:12},
    {name:"Bellingham", price:10, pts:11},
    {name:"Vinícius", price:9, pts:9},
    {name:"Haaland", price:13, pts:15}
];

let myTeam = [];

/* LOAD SAVE */
function load(){
    let saved = localStorage.getItem("team");
    if(saved) myTeam = JSON.parse(saved);
}
load();

/* SAVE */
function save(){
    localStorage.setItem("team",JSON.stringify(myTeam));
}

/* NAV */
function go(i,el){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.querySelectorAll(".page")[i].classList.add("active");

    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    el.classList.add("active");

    render();
}

/* MARKET */
function renderMarket(){
    let el=document.getElementById("market");
    el.innerHTML="";

    players.forEach((p,i)=>{
        let div=document.createElement("div");
        div.className="player";
        div.innerHTML=`
        <div>
            <b>${p.name}</b><br>
            <span class="small">${p.pts} pts</span>
        </div>
        <div>
            <div class="price">${p.price}M</div>
            <button onclick="buy(${i})">Buy</button>
        </div>`;
        el.appendChild(div);
    });
}

/* TEAM */
function renderTeam(){
    let el=document.getElementById("myTeam");
    el.innerHTML="";

    let total=0;

    myTeam.forEach((p,i)=>{
        let pts=p.pts;

        if(captain===p.name) pts*=2;

        total+=pts;

        let div=document.createElement("div");
        div.className="player";
        div.innerHTML=`
        <div>
            <b onclick="setCaptain('${p.name}')">${p.name}</b>
            <div class="small">${pts} pts</div>
        </div>
        <div>
            <button onclick="sell(${i})">Sell</button>
        </div>`;
        el.appendChild(div);
    });

    document.getElementById("totalPts").innerText=total;
    document.getElementById("mePts").innerText=total;
}

/* BUY */
function buy(i){
    let p=players[i];

    if(budget < p.price){
        alert("Нет бюджета!");
        return;
    }

    myTeam.push({...p});
    budget-=p.price;

    save();
    render();
}

/* SELL */
function sell(i){
    budget+=myTeam[i].price;
    myTeam.splice(i,1);

    save();
    render();
}

/* CAPTAIN */
function setCaptain(name){
    captain=name;
    document.getElementById("captainName").innerText=name;
    save();
    render();
}

/* RENDER ALL */
function render(){
    renderMarket();
    renderTeam();
}

/* INIT */
render();

</script>

</body>
</html>
