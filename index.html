<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; margin: 0; }
        .tabs { display: flex; justify-content: space-around; background: #1e1e1e; padding: 10px; position: sticky; top: 0; z-index: 10; }
        .tab { cursor: pointer; color: #888; padding-bottom: 5px; }
        .tab.active { color: #fff; border-bottom: 2px solid #fff; }
        .content { display: none; padding: 15px; }
        .content.active { display: block; }
        
        /* Стили компонентов */
        .stats-header { background: #2c2c2c; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
        .main-button { background: #4a4af4; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .player-row, .match-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #333; }
        .avatar { width: 45px; height: 45px; background-color: #444; border-radius: 50%; background-size: cover; background-position: center; flex-shrink: 0; }
        
        /* Стили поля */
        .field { background: #28a745; border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 15px; display: flex; flex-direction: column; gap: 15px; }
        .pos-row { display: flex; justify-content: center; gap: 15px; }
        .sub-field { display: flex; justify-content: center; gap: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.3); }
        .info-card { background: #1e1e1e; padding: 15px; border-radius: 8px; margin-bottom: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" onclick="showTab('home', this)">Главная</div>
        <div class="tab" id="tab-team" onclick="showTab('team', this)">Моя команда</div>
        <div class="tab" onclick="showTab('matches', this)">Матчи</div>
    </div>

    <!-- Вкладка Главная -->
    <div id="home" class="content active">
        <div class="stats-header">
            <div>Раунд 4</div>
            <div style="font-size: 32px; font-weight: bold;">0</div>
        </div>
        <button class="main-button" onclick="showTab('team', document.getElementById('tab-team'))">УПРАВЛЯТЬ КОМАНДОЙ</button>
    </div>

    <!-- Вкладка Моя команда -->
    <div id="team" class="content">
        <div class="field">
            <div class="pos-row"><div class="avatar" style="border: 2px solid white;"></div></div>
            <div class="pos-row"><div class="avatar"></div><div class="avatar"></div><div class="avatar"></div><div class="avatar"></div></div>
            <div class="pos-row"><div class="avatar"></div><div class="avatar"></div><div class="avatar"></div></div>
            <div class="pos-row"><div class="avatar"></div><div class="avatar"></div></div>
            <div class="sub-field">
                <div class="avatar" style="background: rgba(255,255,255,0.3);"></div>
                <div class="avatar" style="background: rgba(255,255,255,0.3);"></div>
                <div class="avatar" style="background: rgba(255,255,255,0.3);"></div>
                <div class="avatar" style="background: rgba(255,255,255,0.3);"></div>
            </div>
        </div>
        <div class="info-card" onclick="alert('Функция в разработке')">
            <span>ⓘ Узнайте, как игроки получают очки</span><span>></span>
        </div>
        <div class="info-card" style="display: block; text-align: center;">
            <div style="font-weight: bold; margin-bottom: 5px;">Трансферы</div>
            <div style="font-size: 0.8em; color: #888;">Планируете трансферы или используете текущий состав?</div>
            <div style="color: #7b61ff; margin-top: 10px; cursor: pointer;">См. историю трансферов</div>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="main-button">ЗАМЕНЫ</button>
            <button class="main-button">ТРАНСФЕРЫ</button>
        </div>
    </div>

    <!-- Вкладка Матчи -->
    <div id="matches" class="content"><h3>1/16 финала</h3><div id="matches-list"></div></div>

    <script>
        function showTab(tabId, el) {
            document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).style.display = 'block';
            el.classList.add('active');
        }
        Telegram.WebApp.ready();
    </script>
</body>
</html>
