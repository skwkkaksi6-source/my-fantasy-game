<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC Fantasy 3.0</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:white;
}

.header{
display:flex;
justify-content:space-between;
padding:12px;
background:#111826;
position:sticky;
top:0;
z-index:10;
}

.tabs{
display:flex;
background:#111826;
}

.tab{
flex:1;
text-align:center;
padding:10px;
color:#aaa;
cursor:pointer;
}

.tab.active{
color:#4cd964;
border-bottom:2px solid #4cd964;
}

.screen{display:none;padding:12px}
.screen.active{display:block}

.card{
background:#151c26;
padding:12px;
border-radius:12px;
margin-bottom:10px;
}

.pitch{
background:linear-gradient(#1f7a3a,#14532d);
min-height:300px;
border-radius:12px;
padding:10px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:8px;
}

.player{
background:#111826;
padding:8px;
border-radius:10px;
text-align:center;
font-size:12px;
}

.match{
display:flex;
justify-content:space-between;
padding:10px;
background:#111826;
margin:6px 0;
border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
<div>⚽ WC Fantasy 3.0</div>
<div id="total">0 pts</div>
</div>

<div class="tabs">
<div class="tab active" onclick="openTab(0,this)">Главная</div>
<div class="tab" onclick="openTab(1,this)">Команда</div>
<div class="tab" onclick="openTab(2,this)">Матчи</div>
</div>

<!-- HOME -->
<div class="screen active">
<div class="card">
<h3>Очки тура</h3>
<h1 id="gw">0</h1>
</div>
</div>

<!-- TEAM -->
<div class="screen">
<div class="card">
<h3>Состав (ЧМ игроки)</h3>
<div class="pitch" id="pitch"></div>
</div>
</div>

<!-- MATCHES -->
<div class="screen">
<div class="card">
<h3>Матчи</h3>
<div id="matches"></div>
</div>
</div>

<script>

const API_KEY = "ВСТАВЬ_КЛЮЧ";

/* ⚽ PLAYER DATABASE (ID SYSTEM) */
let players = [
{ id: 44, name:"Mbappé", nation:"France", pts:0 },
{ id: 47, name:"Griezmann", nation:"France", pts:0 },

{ id: 85, name:"Messi", nation:"Argentina", pts:0 },
{ id: 92, name:"Álvarez", nation:"Argentina", pts:0 },

{ id: 110, name:"Kane", nation:"England", pts:0 },
{ id: 115, name:"Bellingham", nation:"England", pts:0 },

{ id: 160, name:"Vinícius", nation:"Brazil", pts:0 },
{ id: 165, name:"Rodrygo", nation:"Brazil", pts:0 }
];

/* NAV */
function openTab(i,el){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.querySelectorAll(".screen")[i].classList.add("active");

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
el.classList.add("active");
}

/* ⚽ MATCHES */
async function getMatches(){

const res = await fetch(
"https://v3.football.api-sports.io/fixtures?season=2022&league=1",
{
headers:{ "x-apisports-key": API_KEY }
}
);

const data = await res.json();
return data.response;
}

/* ⚽ EVENTS */
async function getEvents(id){

const res = await fetch(
`https://v3.football.api-sports.io/fixtures/events?fixture=${id}`,
{
headers:{ "x-apisports-key": API_KEY }
}
);

const data = await res.json();
return data.response;
}

/* 🧠 ID MATCH (KEY FIX) */
function isSamePlayer(eventPlayerId, playerId){

return eventPlayerId === playerId;
}

/* 📊 MAIN ENGINE 3.0 */
async function updateFantasy(){

let matches = await getMatches();

/* reset */
players.forEach(p => p.pts = 0);

let total = 0;

let activeMatches = matches.slice(0,5);

for(let m of activeMatches){

let events = await getEvents(m.fixture.id);

for(let p of players){

let pts = 0;

events.forEach(e=>{

if(!e.player) return;

/* ⚽ GOAL */
if(e.type === "Goal" &&
isSamePlayer(e.player.id, p.id)){
pts += 4;
}

/* 🟨 CARD */
if(e.type === "Card" &&
isSamePlayer(e.player.id, p.id)){
pts -= 1;
}

/* 🅰 ASSIST */
if(e.assist &&
isSamePlayer(e.assist.id, p.id)){
pts += 3;
}

});

p.pts += pts;
total += pts;

}

}

document.getElementById("total").innerText = total + " pts";

renderPlayers();
renderMatches(matches);

}

/* 🟩 TEAM */
function renderPlayers(){

let el=document.getElementById("pitch");

el.innerHTML = players.map(p=>`
<div class="player">
${p.name}<br>
${p.nation}<br>
<b>${p.pts}</b>
</div>
`).join("");

}

/* 📅 MATCHES */
function renderMatches(matches){

let el=document.getElementById("matches");

el.innerHTML = matches.slice(0,10).map(m=>`
<div class="match">
<div>${m.teams.home.name}</div>
<b>${m.goals.home ?? 0}-${m.goals.away ?? 0}</b>
<div>${m.teams.away.name}</div>
</div>
`).join("");

}

/* 🔁 AUTO UPDATE */
updateFantasy();
setInterval(updateFantasy, 30 * 60 * 1000);

renderPlayers();

</script>

</body>
</html>
