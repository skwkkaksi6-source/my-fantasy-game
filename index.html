<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SofaScore Style Match App</title>
    <style>
        /* Основные стили страницы */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h3 {
            font-size: 18px;
            margin-bottom: 15px;
            color: #ffffff;
        }

        /* Карточка матча */
        .card {
            background-color: #1c1c1e;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: background-color 0.2s;
        }

        .card:hover {
            background-color: #252527;
        }

        .match-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Время и логотипы */
        .time {
            font-size: 13px;
            color: #a0a0a0;
            font-weight: 600;
            min-width: 50px;
        }

        .badge {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background-color: #444444;
            margin: 0 12px;
        }

        .team-name {
            flex-grow: 1;
            font-size: 15px;
            font-weight: 500;
        }

        /* Интерактивный колокольчик */
        .bell {
            font-size: 20px;
            cursor: pointer;
            color: #555555;
            transition: color 0.2s;
        }

        .bell.active {
            color: #ffeb3b;
        }

        /* Выпадающая статистика */
        .details {
            display: none;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #333333;
            font-size: 13px;
            color: #a0a0a0;
        }

        /* Индикаторы формы (W/L/D) */
        .form-indicator {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .dot {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: white;
        }

        .w { background-color: #28a745; }
        .l { background-color: #dc3545; }
        .d { background-color: #6c757d; }
    </style>
</head>
<body>

    <h3>Матчи на сегодня</h3>
    <div id="matches-list"></div>

    <script>
        // Данные матчей
        const matches = [
            { 
                id: 1, 
                time: "20:00", 
                t1: "Бразилия", 
                t2: "Япония", 
                stats: "Личные встречи: 3 победы Бразилии, 0 побед Японии.",
                form: ['w', 'w', 'l', 'w', 'd'] 
            },
            { 
                id: 2, 
                time: "23:30", 
                t1: "Германия", 
                t2: "Парагвай", 
                stats: "Личные встречи: 1 победа Германии, 1 ничья.",
                form: ['d', 'w', 'w', 'l', 'w'] 
            }
        ];

        // Функция открытия статистики
        function toggleDetails(id) {
            const el = document.getElementById('details-' + id);
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        }

        // Рендер списка
        document.getElementById('matches-list').innerHTML = matches.map(m => `
            <div class="card" onclick="toggleDetails(${m.id})">
                <div class="match-header">
                    <div class="time">${m.time}</div>
                    <div class="badge"></div>
                    <div class="team-name">${m.t1} — ${m.t2}</div>
                    <div class="bell" 
                         onclick="event.stopPropagation(); this.classList.toggle('active'); this.innerText = this.classList.contains('active') ? '🔔' : '🔕'">
                         🔕
                    </div>
                </div>
                
                <div class="details" id="details-${m.id}">
                    <strong>Последняя форма:</strong>
                    <div class="form-indicator">
                        ${m.form.map(f => `<div class="dot ${f}">${f.toUpperCase()}</div>`).join('')}
                    </div>
                    <strong>Статистика:</strong>
                    <div style="margin-top: 5px;">${m.stats}</div>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
