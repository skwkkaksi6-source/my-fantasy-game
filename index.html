<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Матчи Сегодня</title>
    <style>
        body { background-color: #121212; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; }
        .match-card { background: #1e1e1e; border-radius: 12px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
        .match-time { font-weight: bold; color: #ffeb3b; }
        .teams { flex-grow: 1; padding: 0 15px; }
        .btn-notify { background: #333; border: none; color: #fff; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <h3>Матчи на сегодня</h3>
    <div id="match-list"></div>

    <script>
        const matches = [
            { time: "20:00", t1: "Бразилия", t2: "Япония" },
            { time: "23:30", t1: "Германия", t2: "Парагвай" }
        ];

        document.getElementById('match-list').innerHTML = matches.map(m => `
            <div class="match-card">
                <div class="match-time">${m.time}</div>
                <div class="teams">${m.t1} — ${m.t2}</div>
                <button class="btn-notify">🔔</button>
            </div>
        `).join('');
    </script>
</body>
</html>
