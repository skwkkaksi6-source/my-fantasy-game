<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC Fantasy FIX</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0f14;
color:white;
}

.header{
display:flex;
justify-content:space-between;
padding:12px;
background:#111826;
position:sticky;
top:0;
}

.tabs{
display:flex;
background:#111826;
}

.tab{
flex:1;
text-align:center;
padding:10px;
color:#aaa;
cursor:pointer;
}

.tab.active{
color:#4cd964;
border-bottom:2px solid #4cd964;
}

.screen{display:none;padding:12px}
.screen.active{display:block}

.card{
background:#151c26;
padding:12px;
margin-bottom:10px;
border-radius:12px;
}

button{
padding:10px;
width:100%;
border:none;
border-radius:10px;
background:#4cd964;
font-weight:bold;
margin-top:10px;
}

.match{
display:flex;
justify-content:space-between;
padding:10px;
background:#111826;
margin:6px 0;
border-radius:10px;
}

.player{
background:#111826;
padding:8px;
border-radius:10px;
margin:5px 0;
}
</style>
</head>

<body>

<div class="header">
<div>⚽ WC Fantasy FIX</div>
<div id="total">0 pts</div>
</div>

<div class="tabs">
<div class="tab active" onclick="openTab(0,this)">Главная</div>
<div class="tab" onclick="openTab(1,this)">Команда</div>
<div class="tab" onclick="openTab(2,this)">Матчи</div>
</div>

<!-- HOME -->
<div class="screen active">
<div class="card">
<h3>Очки тура</h3>
<h1 id="gw">0</h1>

<button onclick="updateFantasy()">Обновить очки</button>
</div>
</div>

<!-- TEAM -->
<div class="screen">
<div class="card">
<h3>Моя команда</h3>
<div id="team"></div>
</div>
</div>

<!-- MATCHES -->
<div class="screen">
<div class="card">
<h3>Матчи</h3>
<div id="matches"></div>
</div>
</div>

<script>

const API_KEY = "ВСТАВЬ_КЛЮЧ";

/* 👤 ПРОСТАЯ КОМАНДА */
let team = [
{ name:"Mbappé", pts:0 },
{ name:"Messi", pts:0 },
{ name:"Kane", pts:0 }
];

/* TAB */
function openTab(i,el){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.querySelectorAll(".screen")[i].classList.add("active");

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
el.classList.add("active");
}

/* ⚽ MATCHES SAFE */
async function getMatches(){
try{
const res = await fetch(
"https://v3.football.api-sports.io/fixtures?season=2022&league=1",
{
headers:{ "x-apisports-key": API_KEY }
}
);

const data = await res.json();
return data.response || [];
}catch(e){
return [];
}
}

/* ⚽ EVENTS SAFE */
async function getEvents(id){
try{
const res = await fetch(
`https://v3.football.api-sports.io/fixtures/events?fixture=${id}`,
{
headers:{ "x-apisports-key": API_KEY }
}
);

const data = await res.json();
return data.response || [];
}catch(e){
return [];
}
}

/* 🧠 REAL POINTS */
async function updateFantasy(){

let matches = await getMatches();

/* если API пустой */
if(!matches.length){
document.getElementById("matches").innerHTML = "Нет данных API";
return;
}

team.forEach(p => p.pts = 0);

let total = 0;

for(let m of matches.slice(0,5)){

let events = await getEvents(m.fixture.id);

for(let p of team){

let pts = 0;

events.forEach(e=>{

if(!e.player) return;

let name = e.player.name || "";

/* goal */
if(e.type==="Goal" && name.includes(p.name)){
pts += 4;
}

/* card */
if(e.type==="Card" && name.includes(p.name)){
pts -= 1;
}

/* assist */
if(e.assist && e.assist.name && e.assist.name.includes(p.name)){
pts += 3;
}

});

p.pts += pts;
total += pts;

}

}

document.getElementById("total").innerText = total + " pts";

renderTeam();
renderMatches(matches);

}

/* 👤 TEAM UI */
function renderTeam(){

document.getElementById("team").innerHTML =
team.map(p=>`
<div class="player">${p.name} — <b>${p.pts}</b></div>
`).join("");

}

/* 📅 MATCH UI */
function renderMatches(matches){

document.getElementById("matches").innerHTML =
matches.slice(0,10).map(m=>`
<div class="match">
<div>${m.teams.home.name}</div>
<b>${m.goals.home ?? 0}-${m.goals.away ?? 0}</b>
<div>${m.teams.away.name}</div>
</div>
`).join("");

}

/* INIT */
updateFantasy();

renderTeam();

</script>

</body>
</html>
