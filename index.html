<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; margin: 0; }
        .tabs { display: flex; justify-content: space-around; background: #222; padding: 10px; }
        .tab { cursor: pointer; color: #888; padding-bottom: 5px; }
        .tab.active { color: #fff; border-bottom: 2px solid #fff; }
        .content { display: none; padding: 15px; }
        .content.active { display: block; }
        
        .stats-header { background: #2c2c2c; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 15px; }
        .main-button { background: white; color: black; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .deadline-box { background: #4a2828; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .player-row { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #333; }
        .avatar { width: 45px; height: 45px; background-color: #444; border-radius: 50%; margin-right: 15px; background-size: cover; background-position: center; flex-shrink: 0; }
        .pts { font-weight: bold; color: #7b61ff; margin-left: auto; }
        
        .toggle-btn { background: #333; border: none; color: white; width: 100%; padding: 10px; border-radius: 8px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" onclick="showTab('home', this)">Главная</div>
        <div class="tab" id="tab-team" onclick="showTab('team', this)">Моя команда</div>
        <div class="tab" onclick="showTab('matches', this)">Матчи</div>
    </div>

    <div id="home" class="content active">
        <div class="stats-header">
            <div>Раунд 4</div>
            <div id="total-points" style="font-size: 32px; font-weight: bold;">0</div>
            <div>всего очков</div>
            <button class="main-button" onclick="showTab('team', document.getElementById('tab-team'))">УПРАВЛЯТЬ КОМАНДОЙ</button>
        </div>
        
        <div class="deadline-box">
            <span>До дедлайна:</span>
            <span id="timer">00ч : 00м : 00с</span>
        </div>

        <h3>Лучшие игроки</h3>
        <div id="players-list"></div>
        <button id="toggle-btn" class="toggle-btn" onclick="toggleList()">Показать еще</button>
    </div>

    <div id="team" class="content">... Страница состава ...</div>
    <div id="matches" class="content">... Список матчей ...</div>

    <script>
        const playersData = [
            { name: "Винисиус Жуниор", pts: 0, img: "https://a.espncdn.com/combiner/i?img=/i/headshots/soccer/players/full/238717.png" },
            { name: "Лионель Месси", pts: 0, img: "https://a.espncdn.com/combiner/i?img=/i/headshots/soccer/players/full/45843.png" },
            { name: "Усман Дембеле", pts: 0, img: "https://a.espncdn.com/combiner/i?img=/i/headshots/soccer/players/full/232717.png" },
            { name: "Килиан Мбаппе", pts: 0, img: "https://a.espncdn.com/combiner/i?img=/i/headshots/soccer/players/full/242250.png" },
            { name: "Эмерик Лапорт", pts: 0, img: "https://a.espncdn.com/combiner/i?img=/i/headshots/soccer/players/full/206969.png" },
            { name: "Кевин Де Брюйне", pts: 0, img: "https://a.espncdn.com/combiner/i?img=/i/headshots/soccer/players/full/175658.png" }
        ];

        let expanded = false;

        function renderApp() {
            document.getElementById('total-points').innerText = "0";
            const list = document.getElementById('players-list');
            const displayLimit = expanded ? playersData.length : 3;
            
            list.innerHTML = playersData.slice(0, displayLimit).map(p => `
                <div class="player-row">
                    <div class="avatar" style="background-image: url('${p.img}')"></div>
                    <div>${p.name}</div>
                    <div class="pts">${p.pts}pts</div>
                </div>
            `).join('');
            
            document.getElementById('toggle-btn').innerText = expanded ? "Скрыть" : "Показать еще";
        }

        function toggleList() {
            expanded = !expanded;
            renderApp();
        }

        function showTab(tabId, el) {
            document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).style.display = 'block';
            el.classList.add('active');
        }

        function updateTimer() {
            const now = new Date();
            const deadline = new Date();
            deadline.setHours(21, 30, 0, 0);
            if (now > deadline) deadline.setDate(deadline.getDate() + 1);
            const diff = deadline - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('timer').innerText = `${h.toString().padStart(2, '0')}ч : ${m.toString().padStart(2, '0')}м : ${s.toString().padStart(2, '0')}с`;
        }

        renderApp();
        setInterval(updateTimer, 1000);
        updateTimer();
        Telegram.WebApp.ready();
    </script>
</body>
</html>
