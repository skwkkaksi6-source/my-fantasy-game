<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; margin: 0; }
        .tabs { display: flex; justify-content: space-around; background: #222; padding: 10px; }
        .tab { cursor: pointer; color: #aaa; padding-bottom: 5px; }
        .tab.active { color: white; border-bottom: 2px solid #fff; }
        .content { display: none; padding: 15px; }
        .content.active { display: block; }
        
        /* Поле */
        .field { 
            background-color: #21873b; 
            height: 350px; 
            border-radius: 10px; 
            position: relative; 
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            padding-top: 20px;
        }
        .player-slot { text-align: center; width: 60px; }
        .player-photo { 
            width: 50px; height: 50px; background: #ddd; 
            border-radius: 50%; margin-bottom: 5px; 
        }
        .player-name { background: #7b61ff; font-size: 10px; padding: 2px; border-radius: 4px; }
        
        /* Кнопки */
        .btn-container { display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; background: #7b61ff; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" onclick="showTab('home')">Главная</div>
        <div class="tab" onclick="showTab('team')">Моя команда</div>
        <div class="tab" onclick="showTab('matches')">Матчи</div>
    </div>

    <div id="home" class="content active"><h3>Главная (тут будет дизайн)</h3></div>

    <div id="team" class="content">
        <div class="field">
            <!-- Пример слотов -->
            <div class="player-slot"><div class="player-photo"></div><div class="player-name">Игрок</div></div>
            <div class="player-slot"><div class="player-photo"></div><div class="player-name">Игрок</div></div>
        </div>
        <div class="btn-container">
            <button>ЗАМЕНЫ</button>
            <button>ТРАНСФЕРЫ</button>
        </div>
    </div>

    <div id="matches" class="content"><h3>Матчи</h3></div>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
        Telegram.WebApp.ready();
    </script>
</body>
</html>
