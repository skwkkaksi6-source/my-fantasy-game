<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; margin: 0; }
        .tabs { display: flex; justify-content: space-around; background: #1e1e1e; padding: 10px; position: sticky; top: 0; }
        .tab { cursor: pointer; color: #888; padding-bottom: 5px; }
        .tab.active { color: #fff; border-bottom: 2px solid #fff; }
        .content { display: none; padding: 15px; }
        .content.active { display: block; }
        .stats-header { background: #2c2c2c; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
        .player-row, .match-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #333; }
        .avatar { width: 40px; height: 40px; background-color: #444; border-radius: 50%; margin-right: 15px; }
        .pts { margin-left: auto; color: #a388ff; }
        .field { background: #28a745; height: 250px; border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; }
        .info-card { background: #1e1e1e; padding: 15px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; }
        .toggle-btn { background: #333; color: white; width: 100%; padding: 10px; border: none; border-radius: 8px; cursor: pointer; }
        .match-time { font-size: 0.8em; color: #888; min-width: 60px; }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" onclick="showTab('home', this)">Главная</div>
        <div class="tab" onclick="showTab('team', this)">Моя команда</div>
        <div class="tab" onclick="showTab('matches', this)">Матчи</div>
    </div>

    <div id="home" class="content active">
        <div class="stats-header"><div>Раунд 4</div><div style="font-size: 24px;">0 pts</div><div style="color: #f00;">Дедлайн: 12:00:00</div></div>
        <h3>Лучшие игроки</h3>
        <div id="top-players-list"></div>
        <button class="toggle-btn" onclick="togglePlayers()">Показать/Скрыть</button>
    </div>

    <div id="team" class="content">
        <div class="field">ПОЛЕ С ИГРОКАМИ</div>
        <div class="info-card">ⓘ Как получают очки?</div>
        <div class="info-card">🔄 Замены (переключатель состава)</div>
        <button class="toggle-btn">ТРАНСФЕРЫ</button>
    </div>

    <div id="matches" class="content">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;"><span>R2</span><span>R3</span><span style="background:blue; padding:2px 10px; border-radius:5px;">R32</span><span>R16</span></div>
        <div id="matches-list"></div>
    </div>

    <script>
        const players = ["Мбаппе", "Винисиус", "Беллингем", "Холанд", "Месси", "Сака", "Ямаль", "Де Брюйне", "Кейн", "Мусиала", "Фернандес", "Родри", "Диас", "Гакпо", "Салах"];
        let showAll = false;
        function render() {
            const list = showAll ? players : players.slice(0, 3);
            document.getElementById('top-players-list').innerHTML = list.map(p => `<div class="player-row"><div class="avatar"></div>${p}<div class="pts">10pts</div></div>`).join('');
        }
        function togglePlayers() { showAll = !showAll; render(); }
        
        const matches = ["ЮАР-Канада", "Бразилия-Япония", "Германия-Парагвай", "Нидерланды-Марокко", "Кот-д'Ивуар-Норвегия", "Франция-Швеция", "Мексика-Эквадор", "Англия-ДР Конго", "Бельгия-Сенегал", "США-Босния", "Испания-Австрия", "Португалия-Хорватия", "Швейцария-Алжир", "Австралия-Египет", "Аргентина-Кабо-Верде", "Колумбия-Гана"];
        document.getElementById('matches-list').innerHTML = matches.map(m => `<div class="match-row"><div class="match-time">00:00</div>${m}</div>`).join('');

        function showTab(id, el) {
            document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).style.display = 'block';
            el.classList.add('active');
        }
        render();
    </script>
</body>
</html>
