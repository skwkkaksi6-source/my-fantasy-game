<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; margin: 0; }
        .tabs { display: flex; justify-content: space-around; background: #1e1e1e; padding: 10px; position: sticky; top: 0; z-index: 10; }
        .tab { cursor: pointer; color: #888; padding-bottom: 5px; }
        .tab.active { color: #fff; border-bottom: 2px solid #fff; }
        .content { display: none; padding: 15px; }
        .content.active { display: block; }
        
        /* Поле */
        .field { background: #28a745; border-radius: 12px; padding: 20px; height: 300px; display: flex; flex-direction: column; justify-content: space-around; margin-bottom: 15px; }
        .pos-row { display: flex; justify-content: center; gap: 15px; }
        .avatar { width: 40px; height: 40px; background-color: #444; border-radius: 50%; }
        
        .info-card { background: #1e1e1e; padding: 15px; border-radius: 8px; margin-bottom: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .main-button { background: #4a4af4; color: white; border: none; padding: 12px; flex: 1; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .player-row, .match-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #333; }
        .pts { margin-left: auto; color: #a388ff; font-weight: bold; }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" onclick="showTab('home', this)">Главная</div>
        <div class="tab" onclick="showTab('team', this)">Моя команда</div>
        <div class="tab" onclick="showTab('matches', this)">Матчи</div>
    </div>

    <div id="home" class="content active">
        <h3>Лучшие игроки</h3>
        <div id="players-list"></div>
        <button id="toggle-btn" onclick="toggleList()" style="width:100%; padding:10px; margin-top:10px; background:#333; color:white; border:none; border-radius:8px;">Показать еще</button>
    </div>

    <div id="team" class="content">
        <!-- Поле по 1000041495.jpg -->
        <div class="field">
            <div class="pos-row"><div class="avatar" style="background: white;"></div></div>
            <hr style="width: 90%; border: 0; border-top: 1px solid rgba(255,255,255,0.3);">
            <div class="pos-row"><div class="avatar"></div><div class="avatar"></div><div class="avatar"></div></div>
            <div class="pos-row"><div class="avatar"></div><div class="avatar"></div><div class="avatar"></div></div>
            <div class="pos-row"><div class="avatar"></div><div class="avatar"></div></div>
        </div>

        <div style="display: flex; justify-content: space-between; margin-bottom: 15px; background: #1e1e1e; padding: 15px; border-radius: 8px;">
            <span>Очков за тур: <b>0</b></span>
            <span>Всего очков: <b>0</b></span>
        </div>

        <div class="info-card"><span>ⓘ Узнайте, как игроки получают очки</span><span>></span></div>
        
        <div class="info-card" style="display: block;">
            <div style="font-weight: bold; margin-bottom: 5px;">Трансферы</div>
            <div style="font-size: 0.8em; color: #888; margin-bottom: 10px;">Планируете трансферы или используете текущий состав?</div>
            <div style="color: #a388ff; cursor: pointer;">См. историю трансферов</div>
        </div>

        <div style="display: flex; gap: 10px;">
            <button class="main-button" style="background: #333;">ЗАМЕНЫ</button>
            <button class="main-button">ТРАНСФЕРЫ</button>
        </div>
    </div>

    <div id="matches" class="content">
        <h3>Матчи</h3>
        <div id="matches-list"></div>
    </div>

    <script>
        const playersData = [{name: "Месси", pts: "45pts"}, {name: "Мбаппе", pts: "32pts"}, {name: "Де Брюйне", pts: "25pts"}, {name: "Винисиус", pts: "20pts"}, {name: "Дембеле", pts: "15pts"}];
        let expanded = false;
        function renderPlayers() {
            const list = document.getElementById('players-list');
            const limit = expanded ? playersData.length : 3;
            list.innerHTML = playersData.slice(0, limit).map(p => `<div class="player-row"><div class="avatar" style="margin-right:15px"></div>${p.name}<div class="pts">${p.pts}</div></div>`).join('');
            document.getElementById('toggle-btn').innerText = expanded ? "Скрыть" : "Показать еще";
        }
        function toggleList() { expanded = !expanded; renderPlayers(); }
        
        const matchesData = [{d:"28.06", t:"22:00", name:"ЮАР — Канада"}, {d:"29.06", t:"20:00", name:"Бразилия — Япония"}];
        document.getElementById('matches-list').innerHTML = matchesData.map(m => `<div class="match-row"><div style="color:#888; min-width:60px">${m.d}<br>${m.t}</div>${m.name}</div>`).join('');

        function showTab(tabId, el) {
            document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).style.display = 'block';
            el.classList.add('active');
        }
        renderPlayers();
        Telegram.WebApp.ready();
    </script>
</body>
</html>
