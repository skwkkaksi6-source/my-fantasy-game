<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; margin: 0; }
        .tabs { display: flex; justify-content: space-around; background: #1e1e1e; padding: 10px; }
        .tab { cursor: pointer; color: #888; padding-bottom: 5px; }
        .tab.active { color: #fff; border-bottom: 2px solid #fff; }
        .content { display: none; padding: 15px; }
        .content.active { display: block; }
        
        /* Главная шапка */
        .stats-header { background: #2c2c2c; padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
        .main-button { background: white; color: black; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        
        /* Элементы списка */
        .player-row, .match-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #333; }
        .avatar { width: 45px; height: 45px; background-color: #333; border-radius: 50%; margin-right: 15px; background-size: cover; background-position: center; }
        .pts { font-weight: bold; color: #a388ff; margin-left: auto; }
        
        /* Матчи */
        .match-time { font-size: 0.85em; color: #888; min-width: 70px; }
        .flag { width: 25px; height: 18px; margin-right: 10px; border-radius: 2px; }
        .toggle-btn { background: #333; border: none; color: white; width: 100%; padding: 12px; border-radius: 8px; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" onclick="showTab('home', this)">Главная</div>
        <div class="tab" id="tab-team" onclick="showTab('team', this)">Моя команда</div>
        <div class="tab" onclick="showTab('matches', this)">Матчи</div>
    </div>

    <div id="home" class="content active">
        <div class="stats-header">
            <div>Раунд 4</div>
            <div style="font-size: 32px; font-weight: bold;">0</div>
            <div>всего очков</div>
            <button class="main-button" onclick="showTab('team', document.getElementById('tab-team'))">УПРАВЛЯТЬ КОМАНДОЙ</button>
        </div>
        <h3>Лучшие игроки</h3>
        <div id="players-list"></div>
        <button id="toggle-btn" class="toggle-btn" onclick="toggleList()">Показать еще</button>
    </div>

    <div id="matches" class="content">
        <h3>1/16 финала</h3>
        <div id="matches-list"></div>
    </div>

    <div id="team" class="content">... Моя команда ...</div>

    <script>
        const playersData = [
            { name: "Винисиус Жуниор", pts: 0, img: "https://resources.premierleague.com/premierleague/photos/players/250x250/p176297.png" },
            { name: "Лионель Месси", pts: 0, img: "https://a.espncdn.com/combiner/i?img=/i/headshots/soccer/players/full/45843.png" },
            { name: "Усман Дембеле", pts: 0, img: "https://a.espncdn.com/combiner/i?img=/i/headshots/soccer/players/full/232717.png" },
            { name: "Килиан Мбаппе", pts: 0, img: "https://a.espncdn.com/combiner/i?img=/i/headshots/soccer/players/full/242250.png" },
            { name: "Эмерик Лапорт", pts: 0, img: "https://resources.premierleague.com/premierleague/photos/players/250x250/p111180.png" },
            { name: "Кевин Де Брюйне", pts: 0, img: "https://resources.premierleague.com/premierleague/photos/players/250x250/p61366.png" }
        ];

        const matchesData = [
            { date: "29.06", time: "20:00", t1: "Бразилия", t2: "Япония" },
            { date: "29.06", time: "23:30", t1: "Германия", t2: "Парагвай" },
            { date: "30.06", time: "04:00", t1: "Нидерланды", t2: "Марокко" },
            { date: "30.06", time: "20:00", t1: "Кот-д'Ивуар", t2: "Норвегия" },
            { date: "01.07", time: "00:00", t1: "Франция", t2: "Швеция" }
        ];

        let expanded = false;

        function renderApp() {
            const list = document.getElementById('players-list');
            const displayLimit = expanded ? playersData.length : 3;
            list.innerHTML = playersData.slice(0, displayLimit).map(p => `
                <div class="player-row">
                    <div class="avatar" style="background-image: url('${p.img}')"></div>
                    <div>${p.name}</div>
                    <div class="pts">${p.pts}pts</div>
                </div>
            `).join('');
            document.getElementById('toggle-btn').innerText = expanded ? "Скрыть" : "Показать еще";

            document.getElementById('matches-list').innerHTML = matchesData.map(m => `
                <div class="match-row">
                    <div class="match-time">${m.date}<br>${m.time}</div>
                    <div>
                        <div style="margin-bottom: 5px;">${m.t1}</div>
                        <div>${m.t2}</div>
                    </div>
                </div>
            `).join('');
        }

        function toggleList() { expanded = !expanded; renderApp(); }

        function showTab(tabId, el) {
            document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).style.display = 'block';
            el.classList.add('active');
        }

        renderApp();
        Telegram.WebApp.ready();
    </script>
</body>
</html>
