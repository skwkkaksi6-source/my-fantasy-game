<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; margin: 0; }
        .tabs { display: flex; justify-content: space-around; background: #1e1e1e; padding: 10px; position: sticky; top: 0; z-index: 10; }
        .tab { cursor: pointer; color: #888; padding-bottom: 5px; }
        .tab.active { color: #fff; border-bottom: 2px solid #fff; }
        .content { display: none; padding: 15px; }
        .content.active { display: block; }
        
        .field { background: #28a745; border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 15px; display: flex; flex-direction: column; gap: 15px; }
        .pos-row { display: flex; justify-content: center; gap: 15px; }
        .avatar { width: 45px; height: 45px; background-color: #444; border-radius: 50%; }
        .info-card { background: #1e1e1e; padding: 15px; border-radius: 8px; margin-bottom: 15px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .main-button { background: #4a4af4; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        
        .rounds-row { display: flex; justify-content: space-between; align-items: center; background: #1e1e1e; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        .r-item { cursor: pointer; padding: 5px 15px; border-radius: 8px; }
        .r-item.active { background: #4a4af4; }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" onclick="showTab('home', this)">Главная</div>
        <div class="tab" onclick="showTab('team', this)">Моя команда</div>
        <div class="tab" onclick="showTab('matches', this)">Матчи</div>
    </div>

    <div id="home" class="content active">
        <h3>Лучшие игроки</h3>
        <div id="players-list"></div>
        <button id="toggle-btn" onclick="toggleList()" style="width:100%; padding:10px; margin-top:10px;">Показать еще</button>
    </div>

    <div id="team" class="content">
        <div class="field">
            <div class="pos-row"><div class="avatar"></div></div>
            <div class="pos-row"><div class="avatar"></div><div class="avatar"></div><div class="avatar"></div><div class="avatar"></div></div>
            <div class="pos-row"><div class="avatar"></div><div class="avatar"></div><div class="avatar"></div></div>
            <div class="pos-row"><div class="avatar"></div><div class="avatar"></div></div>
        </div>
        <div class="info-card"><span>ⓘ Узнайте, как игроки получают очки</span><span>></span></div>
        <div style="display: flex; gap: 10px;">
            <button class="main-button">ЗАМЕНЫ</button>
            <button class="main-button">ТРАНСФЕРЫ</button>
        </div>
    </div>

    <div id="matches" class="content">
        <div class="rounds-row">
            <div class="r-item">R2</div><div class="r-item">R3</div>
            <div class="r-item active">R32</div><div class="r-item">R16</div>
        </div>
        <div id="matches-list"></div>
    </div>

    <script>
        const playersData = [{name: "Месси", pts: "45pts"}, {name: "Мбаппе", pts: "32pts"}, {name: "Де Брюйне", pts: "25pts"}, {name: "Винисиус", pts: "20pts"}, {name: "Дембеле", pts: "15pts"}, {name: "Холанд", pts: "14pts"}, {name: "Сака", pts: "13pts"}, {name: "Ямаль", pts: "12pts"}, {name: "Кейн", pts: "11pts"}, {name: "Мусиала", pts: "10pts"}, {name: "Фернандес", pts: "9pts"}, {name: "Родри", pts: "8pts"}, {name: "Диас", pts: "7pts"}, {name: "Гакпо", pts: "6pts"}, {name: "Салах", pts: "5pts"}];
        let expanded = false;
        function renderPlayers() {
            const list = document.getElementById('players-list');
            const limit = expanded ? playersData.length : 3;
            list.innerHTML = playersData.slice(0, limit).map(p => `<div style="display:flex; padding:10px; border-bottom:1px solid #333">${p.name}<span style="margin-left:auto">${p.pts}</span></div>`).join('');
            document.getElementById('toggle-btn').innerText = expanded ? "Скрыть" : "Показать еще";
        }
        function toggleList() { expanded = !expanded; renderPlayers(); }
        renderPlayers();

        function showTab(tabId, el) {
            document.querySelectorAll('.content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).style.display = 'block';
            el.classList.add('active');
        }
    </script>
</body> 
</html>
