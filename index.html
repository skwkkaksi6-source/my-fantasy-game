<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
    <style>
        body { background-color: #121212; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto; margin: 0; }
        .tabs { display: flex; justify-content: space-around; background: #1e1e1e; padding: 12px; position: sticky; top: 0; z-index: 100; font-size: 14px; }
        .tab { cursor: pointer; color: #888; }
        .tab.active { color: #fff; border-bottom: 2px solid #fff; padding-bottom: 5px; }
        .swiper-container { width: 100%; height: calc(100vh - 50px); }
        .swiper-slide { overflow-y: auto; padding: 15px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #1e1e1e; padding: 12px; border-radius: 10px; text-align: center; }
        .stat-val { font-size: 16px; font-weight: bold; }
        .stat-lbl { color: #888; font-size: 10px; text-transform: uppercase; margin-top: 4px; }

        .match-card { background: #1e1e1e; border-radius: 8px; padding: 12px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
        .match-info { font-size: 11px; color: #888; text-align: center; width: 60px; }
        .team-row { flex-grow: 1; padding: 0 15px; font-size: 14px; }
        .score { font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>
    <div class="tabs">
        <div class="tab active" onclick="slideTo(0)">Главная</div>
        <div class="tab" onclick="slideTo(1)">Команда</div>
        <div class="tab" onclick="slideTo(2)">Матчи</div>
        <div class="tab" onclick="slideTo(3)">Лиги</div>
    </div>

    <div class="swiper-container">
        <div class="swiper-wrapper">
            <div class="swiper-slide">
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-val">0/15</div><div class="stat-lbl">Игроки</div></div>
                    <div class="stat-card"><div class="stat-val">0</div><div class="stat-lbl">Очки</div></div>
                    <div class="stat-card"><div class="stat-val">0</div><div class="stat-lbl">Р4</div></div>
                </div>
                <h3 style="font-size: 16px;">Расписание</h3>
                <div id="main-matches"></div>
            </div>
            <div class="swiper-slide"><h3>Моя команда</h3></div>
            <div class="swiper-slide"><h3>Все матчи</h3><div id="all-matches"></div></div>
            <div class="swiper-slide"><h3>Лиги</h3></div>
        </div>
    </div>

    <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
    <script>
        const swiper = new Swiper('.swiper-container', { on: { slideChange: function() {
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === swiper.activeIndex));
        }}});
        function slideTo(index) { swiper.slideTo(index); }

        const matchesData = [
            { d: "29.06", t: "20:00", t1: "Бразилия", t2: "Япония", s: "_" },
            { d: "29.06", t: "23:30", t1: "Германия", t2: "Парагвай", s: "—" },
            { d: "30.06", t: "04:00", t1: "Нидерланды", t2: "Марокко", s: "—" }
        ];

        const renderMatches = (data, id) => {
            document.getElementById(id).innerHTML = data.map(m => `
                <div class="match-card">
                    <div class="match-info">${m.d}<br>${m.t}</div>
                    <div class="team-row">${m.t1}<br>${m.t2}</div>
                    <div class="score">${m.s}</div>
                </div>`).join('');
        };

        renderMatches(matchesData, 'main-matches');
        renderMatches(matchesData, 'all-matches');
    </script>
</body>
</html>
